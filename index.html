<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Email Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">📧</span>
                    <h1>AI Email Assistant</h1>
                </div>
                <p class="subtitle">Classify emails and generate professional replies instantly</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="card">
                <!-- Input Section -->
                <section class="input-section">
                    <h2>Email Content</h2>
                    <div class="textarea-container">
                        <textarea 
                            id="emailInput" 
                            placeholder="Paste your email content here..."
                            rows="8"
                            maxlength="5000"
                        ></textarea>
                        <div class="char-counter">
                            <span id="charCount">0</span> / 5000 characters
                        </div>
                    </div>
                    
                    <button id="processBtn" class="process-btn">
                        <span class="btn-text">Generate Reply</span>
                        <span class="btn-loading" style="display: none;">
                            <span class="spinner"></span>
                            Processing...
                        </span>
                    </button>
                </section>

                <!-- Error Section -->
                <section id="errorSection" class="error-section" style="display: none;">
                    <div class="error-content">
                        <span class="error-icon">⚠️</span>
                        <div>
                            <h3>Error</h3>
                            <p id="errorMessage">Something went wrong. Please try again.</p>
                        </div>
                    </div>
                </section>

                <!-- Results Section -->
                <section id="resultsSection" class="results-section" style="display: none;">
                    <h2>Results</h2>
                    
                    <!-- Category Display -->
                    <div class="result-item">
                        <h3>Category</h3>
                        <div id="categoryBadge" class="category-badge">
                            <span class="category-icon"></span>
                            <span class="category-text"></span>
                        </div>
                    </div>

                    <!-- Reply Display -->
                    <div class="result-item">
                        <h3>Suggested Reply</h3>
                        <div class="reply-box">
                            <p id="replyText" class="reply-text"></p>
                            <button id="copyBtn" class="copy-btn">
                                <span class="copy-icon">📋</span>
                                Copy Reply
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by AI • Built with Groq & Llama 3</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
